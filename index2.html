<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>LIXPO | Anti-Error OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --accent: #ff4500; /* DuckDuckGo teması */
            --panel: #111;
            --border: rgba(255,255,255,0.1);
        }
        body, html { margin: 0; height: 100%; background: var(--bg); color: white; font-family: 'Outfit', sans-serif; overflow: hidden; }
        
        #desktop { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle at center, #1a0a05 0%, #050505 100%); transition: 0.5s; }
        #clock { font-size: 6rem; font-weight: 200; margin-bottom: 20px; letter-spacing: -3px; }

        .search-area { width: 500px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 50px; padding: 5px 25px; display: flex; align-items: center; backdrop-filter: blur(20px); transition: 0.3s; }
        .search-area:focus-within { border-color: var(--accent); box-shadow: 0 0 30px rgba(255, 69, 0, 0.2); }
        input { background: transparent; border: none; color: white; width: 100%; padding: 15px; font-size: 1.1rem; outline: none; text-align: center; }

        /* Browser UI */
        #browser-window { position: fixed; inset: 30px; background: var(--panel); border-radius: 16px; border: 1px solid var(--border); display: none; flex-direction: column; z-index: 9999; box-shadow: 0 50px 100px rgba(0,0,0,0.9); overflow: hidden; }
        .browser-bar { background: #1a1a1a; padding: 12px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #333; }
        .dots { display: flex; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .address-bar { flex-grow: 1; background: #000; border: 1px solid #333; border-radius: 8px; padding: 7px 15px; font-size: 0.8rem; color: var(--accent); font-family: monospace; overflow: hidden; }
        .close-btn { background: #ff4b4b; color: white; border: none; padding: 7px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.75rem; }

        iframe { width: 100%; flex-grow: 1; border: none; background: #fff; }
    </style>
</head>
<body>

    <div id="desktop">
        <h1 id="clock">00:00</h1>
        <div class="search-area">
            <input type="text" id="si" placeholder="DuckDuckGo ile içeride ara..." onkeydown="if(event.key==='Enter') executeInternalSearch(this.value)">
        </div>
    </div>

    <div id="browser-window">
        <div class="browser-bar">
            <div class="dots">
                <div class="dot" style="background: #ff5f56;"></div>
                <div class="dot" style="background: #ffbd2e;"></div>
                <div class="dot" style="background: #27c93f;"></div>
            </div>
            <div class="address-bar" id="addr">lixpo://internal-search</div>
            <button class="close-btn" onclick="closeBrowser()">KAPAT</button>
        </div>
        <iframe id="browser-frame" src=""></iframe>
    </div>

    <script>
        function executeInternalSearch(q) {
            if(!q) return;
            const win = document.getElementById('browser-window');
            const frame = document.getElementById('browser-frame');
            const addr = document.getElementById('addr');

            /* ÖNEMLİ: DuckDuckGo Lite sürümü (html=1 parametresi ile) 
               genellikle iframe engellerine takılmaz ve 404 vermez.
            */
            const searchUrl = `https://duckduckgo.com/html/?q=${encodeURIComponent(q)}`;
            
            addr.innerText = "https://duckduckgo.com/?q=" + q;
            frame.src = searchUrl;
            win.style.display = 'flex';
            document.getElementById('desktop').style.filter = 'blur(15px)';
        }

        function closeBrowser() {
            document.getElementById('browser-window').style.display = 'none';
            document.getElementById('browser-frame').src = '';
            document.getElementById('desktop').style.filter = 'none';
            document.getElementById('si').value = '';
        }

        function updateClock() {
            const d = new Date();
            document.getElementById('clock').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
        }
        setInterval(updateClock, 1000); updateClock();

        document.addEventListener('keydown', (e) => { if(e.key === "Escape") closeBrowser(); });
    </script>
</body>
</html>
