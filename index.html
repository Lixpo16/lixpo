<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>LIXPO | Premium OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --accent: #00d2ff; --panel: #111; --border: rgba(255,255,255,0.1); }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: white; font-family: 'Outfit', sans-serif; overflow: hidden; }
        
        /* Desktop */
        #desktop { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle at center, #101010 0%, #050505 100%); }
        #clock { font-size: 6rem; font-weight: 200; margin: 0; letter-spacing: -3px; }
        
        /* Search */
        .search-box { width: 500px; margin-top: 30px; position: relative; }
        input { 
            width: 100%; padding: 18px 30px; border-radius: 50px; border: 1px solid var(--border);
            background: rgba(255,255,255,0.03); color: white; font-size: 1.1rem; outline: none; text-align: center; backdrop-filter: blur(20px);
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 30px rgba(0, 210, 255, 0.2); }

        /* LIXPO Search UI */
        #search-win { position: fixed; inset: 20px; background: var(--panel); border-radius: 15px; border: 1px solid var(--border); display: none; flex-direction: column; z-index: 9999; box-shadow: 0 50px 100px rgba(0,0,0,0.9); }
        .win-bar { background: #1a1a1a; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .win-body { flex-grow: 1; overflow-y: auto; padding: 40px; background: #080808; }

        /* Result Cards */
        .res-card { background: #151515; padding: 25px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #222; transition: 0.3s; }
        .res-card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .res-card a { color: var(--accent); font-size: 1.3rem; text-decoration: none; font-weight: 600; display: block; margin-bottom: 8px; }
        .res-card p { color: #999; font-size: 0.95rem; line-height: 1.6; margin: 0; }
        
        .close-btn { background: #ff4b4b; color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .loader { color: var(--accent); text-align: center; padding: 50px; font-weight: bold; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="desktop">
        <h1 id="clock">00:00</h1>
        <div class="search-box">
            <input type="text" placeholder="LIXPO Secure Search..." onkeydown="if(event.key==='Enter') startSearch(this.value)">
        </div>
    </div>

    <div id="search-win">
        <div class="win-bar">
            <div style="display:flex; gap:8px;">
                <div style="width:12px;height:12px;border-radius:50%;background:#ff5f56;"></div>
                <div style="width:12px;height:12px;border-radius:50%;background:#ffbd2e;"></div>
                <div style="width:12px;height:12px;border-radius:50%;background:#27c93f;"></div>
            </div>
            <span id="status-text" style="font-size:0.8rem; opacity:0.5; font-weight:bold;">LIXPO ENGINE v14.0</span>
            <button class="close-btn" onclick="closeWin()">KAPAT</button>
        </div>
        <div class="win-body" id="results">
            </div>
    </div>

    <script>
        async function startSearch(q) {
            if(!q) return;
            const win = document.getElementById('search-win');
            const resArea = document.getElementById('results');
            
            win.style.display = 'flex';
            resArea.innerHTML = '<div class="loader">SORGULANIYOR...</div>';

            try {
                // DuckDuckGo API - JSON Format (Bağlanmayı reddetmez, veri döner)
                const response = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(q)}&format=json&pretty=1&no_html=1`);
                const data = await response.json();
                
                resArea.innerHTML = ""; // Temizle

                // Ana sonuç varsa göster
                if(data.AbstractText) {
                    resArea.innerHTML += `
                        <div class="res-card">
                            <span style="color:#555; font-size:0.7rem; font-weight:bold;">ÖZET</span>
                            <a href="${data.AbstractURL}" target="_blank">${data.Heading}</a>
                            <p>${data.AbstractText}</p>
                        </div>
                    `;
                }

                // Diğer sonuçları listele
                if(data.RelatedTopics && data.RelatedTopics.length > 0) {
                    data.RelatedTopics.forEach(item => {
                        if(item.Text) {
                            resArea.innerHTML += `
                                <div class="res-card">
                                    <a href="${item.FirstURL}" target="_blank">${item.Text.split(' - ')[0]}</a>
                                    <p>${item.Text}</p>
                                </div>
                            `;
                        }
                    });
                } else {
                    resArea.innerHTML = '<p style="text-align:center; opacity:0.5;">Sonuç bulunamadı.</p>';
                }

            } catch (err) {
                resArea.innerHTML = '<p style="color:red; text-align:center;">Hata: API bağlantısı kurulamadı.</p>';
            }
        }

        function closeWin() {
            document.getElementById('search-win').style.display = 'none';
            document.getElementById('results').innerHTML = '';
        }

        function updateClock() {
            const d = new Date();
            document.getElementById('clock').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
        }
        setInterval(updateClock, 1000); updateClock();
    </script>
</body>
</html>
