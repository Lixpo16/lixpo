<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lixpo Unblocker</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0a0a0a;
  color:white;
  overflow:hidden;
}

/* Splash Screen */
#splash {
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:black;
  z-index:999;
}

#logo {
  font-size:60px;
  font-weight:bold;
  color:red;
  animation: blink 0.8s infinite;
}

@keyframes blink {
  0% {opacity:1;}
  50% {opacity:0.2;}
  100% {opacity:1;}
}

/* Main UI */
#app {
  display:none;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* Top bar */
#topbar {
  background:#111;
  padding:10px;
  display:flex;
  gap:10px;
  align-items:center;
}

#url {
  flex:1;
  padding:10px;
  border:none;
  outline:none;
  background:#1a1a1a;
  color:white;
  border-radius:8px;
}

button {
  background:red;
  border:none;
  padding:10px 15px;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* Tabs */
#tabs {
  display:flex;
  background:#0f0f0f;
}

.tab {
  padding:8px 15px;
  cursor:pointer;
  background:#1a1a1a;
  margin-right:5px;
  border-radius:6px;
}

.tab.active {
  background:red;
}

/* iframe */
#frame {
  flex:1;
  width:100%;
  border:none;
}

/* Loader */
#loader {
  position:absolute;
  top:0;
  left:0;
  height:3px;
  width:0%;
  background:red;
  transition:0.3s;
}
</style>
</head>

<body>

<!-- Splash -->
<div id="splash">
  <div id="logo">LIXPO</div>
</div>

<!-- App -->
<div id="app">
  <div id="loader"></div>

  <div id="topbar">
    <input id="url" placeholder="Site gir... (örnek: google.com)">
    <button onclick="openSite()">Git</button>
    <button onclick="newTab()">+ Tab</button>
  </div>

  <div id="tabs"></div>

  <iframe id="frame"></iframe>
</div>

<script>
let tabs = [];
let currentTab = 0;

setTimeout(() => {
  document.getElementById("splash").style.display="none";
  document.getElementById("app").style.display="flex";
}, 2000);

function formatURL(url){
  if(!url.startsWith("http")){
    return "https://" + url;
  }
  return url;
}

function openSite(){
  let url = document.getElementById("url").value;
  url = formatURL(url);

  document.getElementById("loader").style.width="100%";

  setTimeout(()=>{
    document.getElementById("loader").style.width="0%";
  },500);

  tabs[currentTab].url = url;
  loadTab(currentTab);
}

function newTab(){
  tabs.push({url:"https://example.com"});
  currentTab = tabs.length - 1;
  renderTabs();
  loadTab(currentTab);
}

function loadTab(index){
  currentTab = index;
  document.getElementById("frame").src = tabs[index].url;
  document.getElementById("url").value = tabs[index].url;
  renderTabs();
}

function renderTabs(){
  let tabBar = document.getElementById("tabs");
  tabBar.innerHTML = "";

  tabs.forEach((t, i)=>{
    let el = document.createElement("div");
    el.className = "tab" + (i===currentTab ? " active":"");
    el.innerText = "Tab " + (i+1);

    el.onclick = ()=>loadTab(i);

    tabBar.appendChild(el);
  });
}

/* first tab */
newTab();
</script>

</body>
</html>
