<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>LIXPO | Premium Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --accent: #00d2ff; --panel: #111; --border: rgba(255,255,255,0.08); }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: white; font-family: 'Outfit', sans-serif; overflow: hidden; }
        
        #desktop { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle at center, #121212 0%, #050505 100%); }
        #clock { font-size: 5rem; font-weight: 200; margin: 0; letter-spacing: -2px; }
        #tag { font-size: 0.7rem; letter-spacing: 5px; color: var(--accent); font-weight: 900; margin-bottom: 30px; opacity: 0.8; }

        /* Arama Kutusu */
        .search-area { width: 480px; position: relative; }
        input { 
            width: 100%; padding: 20px 30px; border-radius: 50px; border: 1px solid var(--border);
            background: rgba(255,255,255,0.03); color: white; font-size: 1.1rem; outline: none; text-align: center; backdrop-filter: blur(20px); transition: 0.3s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 30px rgba(0, 210, 255, 0.15); }

        /* LIXPO Search Window */
        #lixpo-win { 
            position: fixed; inset: 25px; background: var(--panel); border-radius: 20px; 
            border: 1px solid var(--border); display: none; flex-direction: column; z-index: 9999;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9); overflow: hidden;
        }
        .win-header { background: #1a1a1a; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .win-body { flex-grow: 1; overflow-y: auto; padding: 40px; background: #080808; scroll-behavior: smooth; }

        /* Arama Sonuç Kartları */
        .res-item { background: #151515; padding: 25px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #222; transition: 0.3s; }
        .res-item:hover { border-color: var(--accent); transform: scale(1.01); }
        .res-item a { color: var(--accent); font-size: 1.2rem; text-decoration: none; font-weight: 600; display: block; margin-bottom: 10px; }
        .res-item p { color: #aaa; font-size: 0.9rem; line-height: 1.6; margin: 0; }
        
        .close-btn { background: #ff4b4b; color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .loader { text-align: center; padding: 50px; color: var(--accent); font-weight: bold; font-size: 1.2rem; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="desktop">
        <h1 id="clock">00:00</h1>
        <p id="tag">LIXPO ENGINE v15.0</p>
        <div class="search-area">
            <input type="text" id="sq" placeholder="Bir şeyler yaz ve Enter'a bas..." onkeydown="if(event.key==='Enter') executeSearch(this.value)">
        </div>
    </div>

    <div id="lixpo-win">
        <div class="win-header">
            <div style="display:flex; gap:8px;">
                <div style="width:12px;height:12px;border-radius:50%;background:#ff5f56;"></div>
                <div style="width:12px;height:12px;border-radius:50%;background:#ffbd2e;"></div>
                <div style="width:12px;height:12px;border-radius:50%;background:#27c93f;"></div>
            </div>
            <span style="font-size:0.8rem; font-weight:bold; color:var(--accent);">LIXPO SECURE BROWSER</span>
            <button class="close-btn" onclick="closeWin()">KAPAT</button>
        </div>
        <div class="win-body" id="res-content">
            </div>
    </div>

    <script>
        async function executeSearch(query) {
            if(!query) return;
            const win = document.getElementById('lixpo-win');
            const content = document.getElementById('res-content');
            
            win.style.display = 'flex';
            content.innerHTML = '<div class="loader">VERİLER ÇEKİLİYOR...</div>';

            try {
                // DuckDuckGo API - Bu yöntem CSP (frame-ancestors) hatası vermez!
                // Çünkü siteyi gömmüyoruz, sadece ham veriyi alıp kendimiz tasarlıyoruz.
                const response = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`);
                const data = await response.json();
                
                content.innerHTML = "";

                // Eğer bir Wikipedia özeti veya ana sonuç varsa
                if(data.AbstractText) {
                    content.innerHTML += `
                        <div class="res-item">
                            <span style="color:#555; font-size:0.7rem; font-weight:bold;">ANA SONUÇ</span>
                            <a href="${data.AbstractURL}" target="_blank">${data.Heading}</a>
                            <p>${data.AbstractText}</p>
                        </div>
                        <hr style="border:0; border-top:1px solid #222; margin: 30px 0;">
                    `;
                }

                // Diğer ilgili konular
                if(data.RelatedTopics && data.RelatedTopics.length > 0) {
                    data.RelatedTopics.forEach(item => {
                        if(item.Text) {
                            content.innerHTML += `
                                <div class="res-item">
                                    <a href="${item.FirstURL}" target="_blank">${item.Text.split(' - ')[0]}</a>
                                    <p>${item.Text}</p>
                                </div>
                            `;
                        }
                    });
                } else if (!data.AbstractText) {
                    content.innerHTML = '<p style="text-align:center; opacity:0.5;">Maalesef içeride sonuç bulunamadı. Lütfen başka bir terim deneyin.</p>';
                }

            } catch (err) {
                content.innerHTML = '<p style="color:red; text-align:center;">Hata: Bağlantı kurulamadı. İnternetinizi kontrol edin.</p>';
            }
        }

        function closeWin() {
            document.getElementById('lixpo-win').style.display = 'none';
            document.getElementById('sq').value = '';
        }

        function updateClock() {
            const d = new Date();
            document.getElementById('clock').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
        }
        setInterval(updateClock, 1000); updateClock();

        // ESC tuşuyla kapatma
        document.addEventListener('keydown', (e) => { if(e.key === "Escape") closeWin(); });
    </script>
</body>
</html>
