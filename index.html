<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>LIXPO | Anti-Fail OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --accent: #00d2ff; --panel: #111; --border: rgba(255,255,255,0.08); }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: white; font-family: 'Outfit', sans-serif; overflow: hidden; }
        
        #desktop { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle at center, #151515 0%, #050505 100%); }
        #clock { font-size: 5rem; font-weight: 200; margin: 0; letter-spacing: -2px; }
        
        .search-area { width: 480px; margin-top: 30px; position: relative; }
        input { 
            width: 100%; padding: 20px 30px; border-radius: 50px; border: 1px solid var(--border);
            background: rgba(255,255,255,0.03); color: white; font-size: 1.1rem; outline: none; text-align: center; backdrop-filter: blur(20px); transition: 0.3s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 30px rgba(0, 210, 255, 0.1); }

        #lixpo-win { position: fixed; inset: 20px; background: var(--panel); border-radius: 20px; border: 1px solid var(--border); display: none; flex-direction: column; z-index: 9999; box-shadow: 0 50px 100px rgba(0,0,0,0.9); }
        .win-header { background: #1a1a1a; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .win-body { flex-grow: 1; overflow-y: auto; padding: 40px; background: #080808; }

        /* Kart Tasarımları */
        .res-item { background: #151515; padding: 20px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #222; }
        .res-item a { color: var(--accent); font-size: 1.1rem; text-decoration: none; font-weight: 600; }
        .res-item p { color: #888; font-size: 0.9rem; margin-top: 5px; }
        
        .fallback-btn { 
            display: inline-block; margin-top: 20px; padding: 15px 30px; 
            background: var(--accent); color: #000; text-decoration: none; 
            border-radius: 10px; font-weight: bold; transition: 0.3s;
        }
        .fallback-btn:hover { transform: scale(1.05); opacity: 0.9; }

        .close-btn { background: #ff4b4b; color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="desktop">
        <h1 id="clock">00:00</h1>
        <div class="search-area">
            <input type="text" id="sq" placeholder="LIXPO Engine ile ara..." onkeydown="if(event.key==='Enter') doSmartSearch(this.value)">
        </div>
    </div>

    <div id="lixpo-win">
        <div class="win-header">
            <div style="display:flex; gap:8px;"><div style="width:12px;height:12px;border-radius:50%;background:#ff5f56;"></div><div style="width:12px;height:12px;border-radius:50%;background:#ffbd2e;"></div><div style="width:12px;height:12px;border-radius:50%;background:#27c93f;"></div></div>
            <span style="font-size:0.7rem; letter-spacing:2px; opacity:0.5;">LIXPO INDEXER</span>
            <button class="close-btn" onclick="closeWin()">KAPAT</button>
        </div>
        <div class="win-body" id="res-content"></div>
    </div>

    <script>
        async function doSmartSearch(query) {
            if(!query) return;
            const win = document.getElementById('lixpo-win');
            const content = document.getElementById('res-content');
            win.style.display = 'flex';
            content.innerHTML = '<p style="text-align:center;">Veritabanı taranıyor...</p>';

            try {
                // DuckDuckGo API araması
                const response = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1`);
                const data = await response.json();
                
                content.innerHTML = "";

                let found = false;

                if(data.AbstractText) {
                    content.innerHTML += `<div class="res-item"><a href="${data.AbstractURL}" target="_blank">${data.Heading}</a><p>${data.AbstractText}</p></div>`;
                    found = true;
                }

                if(data.RelatedTopics && data.RelatedTopics.length > 0) {
                    data.RelatedTopics.slice(0, 5).forEach(item => {
                        if(item.Text) {
                            content.innerHTML += `<div class="res-item"><a href="${item.FirstURL}" target="_blank">${item.Text.split(' - ')[0]}</a><p>${item.Text}</p></div>`;
                            found = true;
                        }
                    });
                }

                // EĞER SONUÇ BULUNAMAZSA (Fallback Sistemi)
                if(!found) {
                    content.innerHTML = `
                        <div style="text-align:center; padding: 40px 0;">
                            <h2 style="margin-bottom:10px;">Dahili sonuç bulunamadı.</h2>
                            <p style="color:#666;">DuckDuckGo üzerinden geniş çaplı aramaya devam etmek ister misiniz?</p>
                            <a href="https://duckduckgo.com/?q=${encodeURIComponent(query)}" target="_blank" class="fallback-btn">DIŞARIDA ARA (YENİ SEKME)</a>
                            <p style="font-size:0.7rem; margin-top:20px; color:#444;">Not: Güvenlik duvarları nedeniyle bazı siteler pencere içinde açılamaz.</p>
                        </div>
                    `;
                }

            } catch (err) {
                content.innerHTML = '<p style="text-align:center; color:red;">Bağlantı hatası oluştu.</p>';
            }
        }

        function closeWin() { document.getElementById('lixpo-win').style.display = 'none'; }
        function updateClock() {
            const d = new Date();
            document.getElementById('clock').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
        }
        setInterval(updateClock, 1000); updateClock();
    </script>
</body>
</html>
