<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIXPO OS | v19 Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --accent: #00d2ff; --panel: rgba(20, 20, 20, 0.95); --border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; overflow: hidden; }

        #desktop { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle at center, #111, #050505); }
        #clock { font-size: 4rem; font-weight: 200; margin-bottom: 20px; }

        /* Dock */
        #dock { position: fixed; bottom: 20px; display: flex; gap: 15px; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid var(--border); }
        .dock-btn { width: 60px; height: 60px; background: #1a1a1a; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; cursor: pointer; transition: 0.3s; }
        .dock-btn:hover { transform: translateY(-10px); background: var(--accent); }

        /* Pencere */
        .win { position: fixed; inset: 30px; background: var(--panel); border-radius: 20px; border: 1px solid var(--border); display: none; flex-direction: column; z-index: 100; overflow: hidden; }
        .win-header { padding: 15px 25px; background: #111; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .win-body { flex-grow: 1; overflow-y: auto; background: #080808; position: relative; }
        .close-btn { background: #ff4b4b; border: none; color: #fff; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* Oyun Grid */
        #game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 30px; }
        .game-card { background: #151515; border-radius: 15px; overflow: hidden; border: 1px solid #222; cursor: pointer; transition: 0.3s; }
        .game-card:hover { border-color: var(--accent); transform: scale(1.02); }
        .game-img { width: 100%; height: 120px; background-size: cover; background-position: center; }
        .game-info { padding: 12px; }
        .game-name { font-weight: bold; font-size: 0.9rem; color: var(--accent); }

        iframe { width: 100%; height: 100%; border: none; display: none; }
        .loading-overlay { position: absolute; inset: 0; background: #000; display: none; align-items: center; justify-content: center; z-index: 50; }
    </style>
</head>
<body>

    <div id="desktop">
        <div id="clock">00:00</div>
        <div id="dock">
            <div class="dock-btn" onclick="openGames()">🎮</div>
            <div class="dock-btn" onclick="location.reload()">🔄</div>
        </div>
    </div>

    <div class="win" id="game-win">
        <div class="win-header">
            <span id="win-title">LIXPO GAME HUB</span>
            <button class="close-btn" onclick="closeGames()">KAPAT</button>
        </div>
        <div class="win-body">
            <div id="loading" class="loading-overlay">LÜTFEN BEKLEYİN, OYUN YÜKLENİYOR...</div>
            <div id="game-grid"></div>
            <iframe id="game-frame" src=""></iframe>
        </div>
    </div>

    <script>
        const games = [
            { name: "Eaglecraft 1.8", img: "https://wallpaperaccess.com/full/1501131.jpg", url: "https://precisionclient.vercel.app/" },
            { name: "Minecraft Classic", img: "https://classic.minecraft.net/favicon.ico", url: "https://classic.minecraft.net/" },
            { name: "Paper.io 2", img: "https://paper-io.com/img/screen.png", url: "https://paper-io.com/" },
            { name: "Geometry Dash", img: "https://i.ytimg.com/vi/jYp9U99Yq9Y/maxresdefault.jpg", url: "https://geometrydash.io/" },
            { name: "Pac-Man", img: "https://www.google.com/logos/2010/pacman10-i.html/../../logos/2010/pacman10-hp.png", url: "https://www.google.com/logos/2010/pacman10-i.html" },
            { name: "Snake", img: "https://www.google.com/logos/2010/snake-hp.png", url: "https://www.google.com/logos/2010/snake.html" },
            { name: "Slope", img: "https://slopegame.io/favicon.ico", url: "https://slope-game.github.io/" },
            { name: "1v1.LOL", img: "https://1v1.lol/favicon.ico", url: "https://1v1.lol/" },
            { name: "Crossy Road", img: "https://picsum.photos/seed/crossy/300/150", url: "https://poki.com/tr/g/crossy-road" }
        ];

        // 50+ Oyun için döngü (Poki üzerindeki en popüler oyunlar)
        for(let i = 1; i <= 42; i++) {
            games.push({
                name: `Popüler Oyun #${i}`,
                img: `https://picsum.photos/seed/game${i}/300/150`,
                url: "https://poki.com/" // Genel link, tıklandığında Poki'ye gider
            });
        }

        function openGames() {
            document.getElementById('game-win').style.display = 'flex';
            const grid = document.getElementById('game-grid');
            grid.innerHTML = "";
            games.forEach(g => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `
                    <div class="game-img" style="background-image: url('${g.img}')"></div>
                    <div class="game-info"><div class="game-name">${g.name}</div></div>
                `;
                card.onclick = () => launchGame(g.url, g.name);
                grid.appendChild(card);
            });
        }

        function launchGame(url, name) {
            document.getElementById('game-grid').style.display = 'none';
            document.getElementById('loading').style.display = 'flex';
            const frame = document.getElementById('game-frame');
            frame.src = url;
            frame.style.display = 'block';
            document.getElementById('win-title').innerText = "OYNANIYOR: " + name;
            
            frame.onload = () => {
                document.getElementById('loading').style.display = 'none';
            };
        }

        function closeGames() {
            const win = document.getElementById('game-win');
            win.style.display = 'none';
            document.getElementById('game-frame').src = "";
            document.getElementById('game-frame').style.display = 'none';
            document.getElementById('game-grid').style.display = 'grid';
            document.getElementById('win-title').innerText = "LIXPO GAME HUB";
        }

        function updateClock() {
            const n = new Date();
            document.getElementById('clock').innerText = n.getHours().toString().padStart(2,'0') + ":" + n.getMinutes().toString().padStart(2,'0');
        }
        setInterval(updateClock, 1000); updateClock();
    </script>
</body>
</html>
