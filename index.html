<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Lixpo Pro Hub</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#0a0a0a,#111);
  color:white;
  overflow:hidden;
}

/* HEADER */
header {
  display:flex;
  gap:10px;
  padding:10px;
  background: rgba(20,20,20,0.8);
  backdrop-filter: blur(10px);
  border-bottom:1px solid #222;
}

input {
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#1a1a1a;
  color:white;
}

button {
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background: linear-gradient(45deg, red, crimson);
  color:white;
  cursor:pointer;
}

/* LOADING */
#loading {
  height:3px;
  background:red;
  width:0%;
  transition:0.3s;
}

/* LAYOUT */
.container {
  display:flex;
  height:calc(100vh - 60px);
}

/* SIDEBAR */
.sidebar {
  width:200px;
  background:#111;
  padding:10px;
  border-right:1px solid #222;
}

.game {
  padding:10px;
  margin-bottom:8px;
  border-radius:8px;
  background:#1a1a1a;
  cursor:pointer;
  text-align:center;
}

.game:hover {
  background:red;
}

/* MAIN */
.main {
  flex:1;
  display:flex;
  flex-direction:column;
}

/* TABS */
.tabs {
  display:flex;
  background:#1a1a1a;
  overflow-x:auto;
}

.tab {
  padding:10px;
  display:flex;
  gap:5px;
  align-items:center;
  border-right:1px solid #333;
  cursor:pointer;
}

.tab.active {
  background:red;
}

.close {
  color:#aaa;
  cursor:pointer;
}

/* VIEW */
iframe {
  flex:1;
  width:100%;
  border:none;
}
</style>
</head>

<body>

<header>
  <input id="urlBox" placeholder="URL veya Bing arama...">
  <button onclick="go()">Git</button>
  <button onclick="newTab()">+ Sekme</button>
  <button onclick="toggleIncognito()">🕶️</button>
</header>

<div id="loading"></div>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="game" onclick="openSite('https://play2048.co/')">2048</div>
    <div class="game" onclick="openSite('https://chromedino.com/')">Dino</div>
    <div class="game" onclick="openSite('https://tetris.com/play-tetris')">Tetris</div>
    <div class="game" onclick="openSite('https://snake.io/')">Snake</div>
    <div class="game" onclick="openSite('https://slither.io/')">Slither</div>
    <div class="game" onclick="openSite('https://krunker.io/')">Krunker</div>
    <div class="game" onclick="openSite('https://1v1.lol/')">1v1</div>
    <div class="game" onclick="openSite('https://agar.io/')">Agar</div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="tabs" id="tabs"></div>
    <iframe id="viewer" src="https://www.bing.com"></iframe>
  </div>

</div>

<script>
let tabs = [];
let current = 0;
let incognito = false;

/* LOADING */
function loadStart(){
  let l = document.getElementById("loading");
  l.style.width="40%";
  setTimeout(()=>l.style.width="80%",200);
}

function loadEnd(){
  let l = document.getElementById("loading");
  l.style.width="100%";
  setTimeout(()=>l.style.width="0%",300);
}

/* TABS */
function render(){
  let t = document.getElementById("tabs");
  t.innerHTML="";

  tabs.forEach((tab,i)=>{
    let div = document.createElement("div");
    div.className="tab"+(i===current?" active":"");

    div.innerHTML = `
      <span onclick="switchTab(${i})">${tab.name}</span>
      <span class="close" onclick="closeTab(${i})">✕</span>
    `;

    t.appendChild(div);
  });
}

function switchTab(i){
  current=i;
  load(tabs[i].url);
  render();
}

function newTab(){
  tabs.push({name:"Yeni Sekme",url:"https://www.bing.com"});
  current=tabs.length-1;
  render();
  load("https://www.bing.com");
}

function closeTab(i){
  tabs.splice(i,1);
  if(current>=tabs.length) current=tabs.length-1;
  if(tabs.length>0){
    load(tabs[current].url);
  }
  render();
}

/* NAV */
function go(){
  let input=document.getElementById("urlBox").value;

  let url = input.startsWith("http")
    ? input
    : "https://www.bing.com/search?q="+encodeURIComponent(input);

  tabs[current]={name:input,url:url};
  load(url);
  render();
}

function openSite(url){
  tabs.push({name:"Oyun",url:url});
  current=tabs.length-1;
  render();
  load(url);
}

function load(url){
  loadStart();
  document.getElementById("viewer").src=url;
}

/* INCOGNITO */
function toggleIncognito(){
  incognito=!incognito;
  alert(incognito?"Gizli Açık":"Gizli Kapalı");
}

document.getElementById("viewer").onload=loadEnd;

/* INIT */
newTab();
</script>

</body>
</html>
